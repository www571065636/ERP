services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_backend
    ports:
      - "8002:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_SECRET_KEY=docker-dev-secret-key-erp-2024
      - DJANGO_DEBUG=true
      - DJANGO_ALLOWED_HOSTS=backend,localhost,127.0.0.1,172.18.0.3
      - CORS_ALLOW_ALL_ORIGINS=true
      - DJANGO_ADMIN_PASSWORD=admin123
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - ./backend/config:/app/config
      - ./backend/common:/app/common
      - ./backend/system:/app/system
      - ./backend/product:/app/product
      - ./backend/purchase:/app/purchase
      - ./backend/sales:/app/sales
      - ./backend/inventory:/app/inventory
      - ./backend/finance:/app/finance
      - ./backend/hr:/app/hr
      - ./backend/manage.py:/app/manage.py
      - ./backend/seed_data.py:/app/seed_data.py
      - ./backend/requirements.txt:/app/requirements.txt
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped
